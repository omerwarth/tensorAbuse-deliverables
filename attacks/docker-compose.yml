version: '3.8'

services:
  listener:
    build:
      context: ./listener-container
      dockerfile: Dockerfile
    container_name: tensorabuse-listener
    ports:
      - "9000:9000"
    networks:
      tensorabuse-net:
        ipv4_address: 10.10.0.6
    restart: unless-stopped
    environment:
      - PYTHONUNBUFFERED=1

  victim:
    build:
      # Use attacks/ as context so Dockerfile can access shared requirements
      # and all victim scenario subfolders.
      context: .
      dockerfile: victim-container/Dockerfile
    container_name: tensorabuse-victim
    depends_on:
      - listener
    networks:
      - tensorabuse-net
    environment:
      - PYTHONUNBUFFERED=1
      # Options: file_read, code_execution, shell_access
      - ATTACK_SCENARIO=file_read

networks:
  tensorabuse-net:
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 10.10.0.0/24
